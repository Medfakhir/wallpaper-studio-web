[build]
  # Build command for Flutter web - installs Flutter first, then builds
  command = """
    # Install Flutter
    git clone https://github.com/flutter/flutter.git -b stable --depth 1 /opt/flutter
    export PATH="$PATH:/opt/flutter/bin"
    
    # Verify Flutter installation
    flutter --version
    
    # Get dependencies
    flutter pub get
    
    # Build for web
    flutter build web --release
  """
  # Directory to publish (the built files)
  publish = "build/web"

[build.environment]
  # Disable Flutter analytics
  FLUTTER_ANALYTICS = "false"

# Redirect all requests to index.html for Flutter routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
