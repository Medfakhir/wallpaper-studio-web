[build]
  # Build command - uses custom build script
  command = "bash build.sh"
  # Directory to publish (the built files)
  publish = "build/web"

[build.environment]
  # Disable Flutter analytics
  FLUTTER_ANALYTICS = "false"

# Redirect all requests to index.html for Flutter routing
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Headers for better performance
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
