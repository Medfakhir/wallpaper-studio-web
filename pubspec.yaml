name: wallpaper_studio_web
description: Professional wallpaper editor for creating depth effect live wallpapers
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  google_fonts: ^6.1.0
  intl: ^0.19.0
  http: ^1.1.0
  file_picker: ^8.0.0
  image: ^4.0.0
  universal_html: ^2.2.4
  js: ^0.7.1
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
